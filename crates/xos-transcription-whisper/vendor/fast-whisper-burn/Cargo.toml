[package]
name = "fast-whisper-burn"
version = "0.1.0"
edition = "2024"

[dependencies]
# `default-features = false` is required: Burn defaults enable `burn-wgpu?/default` â†’ `fusion`, which hits
# `DTypeMismatch` in burn-ir (Conv1d via Fusion) on some setups. Without defaults, `Wgpu` = CubeBackend only.
burn         = { git = "https://github.com/tracel-ai/burn.git", rev = "9deccba", default-features = false, features = ["std", "wgpu", "autotune", "ndarray"] }
burn-store   = { git = "https://github.com/tracel-ai/burn.git",   rev = "9deccba", features = ["burnpack", "pytorch"] }
burn-cubecl  = { git = "https://github.com/tracel-ai/burn.git",   rev = "9deccba" }
burn-fusion  = { git = "https://github.com/tracel-ai/burn.git",   rev = "9deccba" }
burn-ir      = { git = "https://github.com/tracel-ai/burn.git",   rev = "9deccba" }
burn-backend = { git = "https://github.com/tracel-ai/burn.git",   rev = "9deccba" }
cubecl       = { git = "https://github.com/tracel-ai/cubecl.git", rev = "83b0ba08111276bc0b9064f6b1d25923639aaccf", features = ["stdlib"] }
half = "2"
serde = { version = "1.0", features = ["std", "derive"] }
hound = "3.5.1"
tokenizers = { version = "0.22.2", default-features = false, features = ["onig"] }
strum = "0.28.0"
strum_macros = "0.28.0"
log = "0.4"
mt19937 = "3.3.0"
