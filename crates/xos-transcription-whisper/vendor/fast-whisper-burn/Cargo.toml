[package]
name = "fast-whisper-burn"
version = "0.1.0"
edition = "2024"

[dependencies]
# Pinned with workspace root / `xos-transcription-whisper` (`=0.21.0-pre.3`, `cubecl =0.10.0-pre.3`).
burn         = { version = "=0.21.0-pre.3", default-features = false, features = ["std", "wgpu", "autotune", "ndarray", "fusion"] }
burn-store   = { version = "=0.21.0-pre.3", features = ["burnpack", "pytorch"] }
burn-cubecl  = { version = "=0.21.0-pre.3" }
burn-fusion  = { version = "=0.21.0-pre.3" }
burn-ir      = { version = "=0.21.0-pre.3" }
burn-backend = { version = "=0.21.0-pre.3" }
cubecl       = { version = "=0.10.0-pre.3", features = ["stdlib"] }
half = "2"
serde = { version = "1.0", features = ["std", "derive"] }
hound = "3.5.1"
tokenizers = { version = "0.22.2", default-features = false, features = ["onig"] }
strum = "0.28.0"
strum_macros = "0.28.0"
log = "0.4"
mt19937 = "3.3.0"
