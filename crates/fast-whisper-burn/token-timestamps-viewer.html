<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Token Timestamp Player</title>
<style>
  body { font-family: monospace; background: #1e1e1e; color: #ccc; margin: 2em; }
  #controls { margin-bottom: 1em; }
  audio { width: 100%; }
  #tokens { line-height: 2.2; font-size: 18px; }
  .tok { padding: 2px 1px; border-radius: 3px; cursor: pointer; transition: background 0.05s; }
  .tok:hover { background: #444; }
  .tok.active { background: #e8a427; color: #000; }
  #info { margin-top: 1em; color: #888; font-size: 13px; }
</style>
</head>
<body>
<div id="controls">
  <audio id="audio" controls src="audio.wav"></audio>
</div>
<div id="tokens"></div>
<div id="info">Loading transcription.tokens.tsv...</div>
<script>
const audio = document.getElementById('audio');
const container = document.getElementById('tokens');
const info = document.getElementById('info');
let tokens = [];

fetch('transcription.tokens.tsv')
  .then(r => r.text())
  .then(tsv => {
    const lines = tsv.trim().split('\n').slice(1); // skip header
    tokens = lines.map(line => {
      const [start, end, text] = line.split('\t');
      return { start: +start, end: +end, text };
    });
    render();
    info.textContent = tokens.length + ' tokens loaded. Click a token to seek.';
  })
  .catch(() => info.textContent = 'Failed to load transcription.tokens.tsv');

function render() {
  container.innerHTML = '';
  tokens.forEach((t, i) => {
    const span = document.createElement('span');
    span.className = 'tok';
    span.textContent = t.text;
    span.dataset.idx = i;
    span.addEventListener('click', () => { audio.currentTime = t.start / 1000; audio.play(); });
    container.appendChild(span);
  });
}

let prevIdx = -1;
function tick() {
  const ms = audio.currentTime * 1000;
  const idx = tokens.findIndex(t => ms >= t.start && ms < t.end);
  if (idx !== prevIdx) {
    if (prevIdx >= 0) container.children[prevIdx]?.classList.remove('active');
    if (idx >= 0) {
      const el = container.children[idx];
      el.classList.add('active');
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
    prevIdx = idx;
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
