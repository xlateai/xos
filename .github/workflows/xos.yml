name: xos pipeline

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - ".github/workflows/xos.yml"
  workflow_dispatch:
    inputs:
      force:
        description: >
          Run publish + GitHub release even when Cargo.toml matches crates.io and a GitHub
          release for v* already exists (rare repair). Usually unnecessary: the workflow
          auto-runs when crates.io is ahead OR when this version has no GitHub release yet.
        required: false
        default: false
        type: boolean

jobs:
  detect-version-bump:
    name: Detect publish / release (Cargo vs crates.io)
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      current_version: ${{ steps.check.outputs.current_version }}
      crates_io_version: ${{ steps.check.outputs.crates_io_version }}
      ahead_of_crates: ${{ steps.check.outputs.ahead_of_crates }}
      github_release_missing: ${{ steps.check.outputs.github_release_missing }}
      crate_name: ${{ steps.check.outputs.crate_name }}
      forced: ${{ steps.check.outputs.forced }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          crate_name=$(grep '^name =' Cargo.toml | head -n1 | cut -d '"' -f2)
          current_version=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)

          forced=false
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${INPUT_FORCE}" = "true" ]; then
            forced=true
          fi

          # Latest version published on crates.io (authoritative for "did we ship this yet?")
          api_url="https://crates.io/api/v1/crates/${crate_name}"
          http_code=$(curl -sS -o /tmp/crates_api.json -w "%{http_code}" "$api_url" || echo "000")
          crates_io_version=""
          if [ "$http_code" = "200" ] && [ -s /tmp/crates_api.json ]; then
            crates_io_version=$(python3 -c "import json; print(json.load(open('/tmp/crates_api.json'))['crate']['max_version'])" 2>/dev/null || true)
          fi

          ahead_of_crates=false
          if [ -n "$crates_io_version" ]; then
            hi=$(printf '%s\n%s\n' "$crates_io_version" "$current_version" | sort -V | tail -n1)
            if [ "$current_version" = "$hi" ] && [ "$current_version" != "$crates_io_version" ]; then
              ahead_of_crates=true
            fi
          elif [ "$http_code" = "404" ]; then
            # Crate not on crates.io yet — first publish
            ahead_of_crates=true
          fi

          # No version bump needed: crates.io already has this version but GitHub has no release for vX.Y.Z
          github_release_missing=false
          tag="v${current_version}"
          if ! gh release view "${tag}" >/dev/null 2>&1; then
            github_release_missing=true
          fi

          should_run=false
          if [ "$forced" = true ]; then
            should_run=true
          elif [ "$ahead_of_crates" = true ]; then
            should_run=true
          elif [ "$github_release_missing" = true ]; then
            should_run=true
          fi

          echo "crate_name=${crate_name}" >> "$GITHUB_OUTPUT"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "crates_io_version=${crates_io_version:-}" >> "$GITHUB_OUTPUT"
          echo "ahead_of_crates=${ahead_of_crates}" >> "$GITHUB_OUTPUT"
          echo "github_release_missing=${github_release_missing}" >> "$GITHUB_OUTPUT"
          echo "forced=${forced}" >> "$GITHUB_OUTPUT"
          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"

          echo "---"
          echo "Cargo.toml version: ${current_version}"
          echo "crates.io latest:   ${crates_io_version:-<none or unavailable>}"
          echo "ahead of crates.io: ${ahead_of_crates}"
          echo "GitHub release missing for ${tag}: ${github_release_missing}"
          echo "workflow_dispatch force: ${forced}"
          echo "should_run: ${should_run}"

  publish-rust:
    name: Publish Rust crate
    runs-on: ubuntu-latest
    needs: [detect-version-bump]
    if: needs.detect-version-bump.outputs.should_run == 'true'
    outputs:
      published: ${{ steps.set-output.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - id: version-check
        shell: bash
        run: |
          set -euo pipefail
          crate_name="${{ needs.detect-version-bump.outputs.crate_name }}"
          version="${{ needs.detect-version-bump.outputs.current_version }}"
          echo "Checking if ${crate_name}@${version} exists on crates.io..."
          if cargo search "$crate_name" --limit 100 | grep -E "^$crate_name = \"$version\""; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish
        if: steps.version-check.outputs.exists != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --no-verify
      - id: set-output
        if: steps.version-check.outputs.exists != 'true'
        run: echo "published=true" >> "$GITHUB_OUTPUT"

  publish-github-release:
    name: Tag commit and publish GitHub release
    runs-on: ubuntu-latest
    needs: [detect-version-bump]
    if: needs.detect-version-bump.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ needs.detect-version-bump.outputs.current_version }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally."
          else
            git tag "${tag}" "${GITHUB_SHA}"
          fi

          if git ls-remote --tags origin | grep -q "refs/tags/${tag}$"; then
            echo "Tag ${tag} already exists on origin."
          else
            git push origin "${tag}"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists — skipping create (idempotent)."
          else
            gh release create "${tag}" \
              --target "${GITHUB_SHA}" \
              --title "${tag}" \
              --generate-notes
          fi
