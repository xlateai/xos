[target.aarch64-apple-ios]
rustflags = [
    "-C", "link-arg=-miphoneos-version-min=15.1",
    "-C", "link-arg=-Wl,-no_compact_unwind",
]

[target.aarch64-apple-ios-sim]
rustflags = [
    "-C", "link-arg=-miphoneos-version-min=15.1",
    "-C", "link-arg=-Wl,-no_compact_unwind",
]

[target.x86_64-apple-ios]
rustflags = [
    "-C", "link-arg=-miphoneos-version-min=15.1",
]




