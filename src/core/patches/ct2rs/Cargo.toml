[dependencies.anyhow]
version = "1.0"

[dependencies.cxx]
version = "1.0"
features = ["c++17"]

[dependencies.hf-hub]
version = "0.4"
optional = true

[dependencies.intel-onemkl-prebuild]
version = "0.2"
optional = true

[dependencies.mel_spec]
version = "0.3"
optional = true

[dependencies.ndarray]
version = "0.16"
optional = true

[dependencies.onednn-src]
version = "0.1"
optional = true

[dependencies.sentencepiece]
version = "0.13"
optional = true

[dependencies.serde]
version = "1.0"
features = ["derive"]
optional = true

[dependencies.serde_json]
version = "1.0"
optional = true

[dependencies.tokenizers]
version = "0.22"
optional = true

[dev-dependencies.clap]
version = "4.5"
features = ["derive"]

[dev-dependencies.hound]
version = "3.5.1"

[dev-dependencies.rand]
version = "0.9"

[build-dependencies.cmake]
version = "0.1"

[build-dependencies.cxx-build]
version = "1.0"

[build-dependencies.walkdir]
version = "2.5"

[target.'cfg(not(target_os = "windows"))'.dependencies.openblas-src]
version = "0.10"
features = ["static"]
optional = true

[target.'cfg(target_os = "windows")'.dependencies.openblas-src]
version = "0.10"
features = [
    "static",
    "system",
]
optional = true
