[package]
edition = "2021"
name = "ct2rs"
version = "0.9.18"
authors = ["Junpei Kawamoto <kawamoto.junpei@gmail.com>"]
build = "build.rs"
include = [
    "/include",
    "/src",
    "/build.rs",
    "/LICENSE",
    "/examples",
    "/CTranslate2/CMakeLists.txt",
    "/CTranslate2/LICENSE",
    "/CTranslate2/cmake",
    "/CTranslate2/cpp",
    "/CTranslate2/include",
    "/CTranslate2/python",
    "/CTranslate2/src",
    "/CTranslate2/third_party",
    "!/CTranslate2/**/.*",
    "!/CTranslate2/**/test",
    "!/CTranslate2/**/docs",
    "!/CTranslate2/**/media",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust bindings for OpenNMT/CTranslate2"
documentation = "https://docs.rs/ct2rs"
readme = "README.md"
keywords = [
    "ctranslate2",
    "bindings",
    "llm",
    "whisper",
]
categories = ["api-bindings"]
license = "MIT"
repository = "https://github.com/jkawamoto/ctranslate2-rs"

[package.metadata.docs.rs]
features = [
    "whisper",
    "hub",
]

[features]
accelerate = []
all-tokenizers = [
    "sentencepiece",
    "tokenizers",
]
cuda = []
cuda-dynamic-loading = ["cuda"]
cuda-small-binary = []
cudnn = ["cuda"]
default = [
    "all-tokenizers",
    "ruy",
    "cuda-small-binary",
]
disable-cpu-dispatch = []
dnnl = ["dep:onednn-src"]
flash-attention = []
hub = ["dep:hf-hub"]
mkl = ["dep:intel-onemkl-prebuild"]
openblas = ["dep:openblas-src"]
openmp-runtime-comp = []
openmp-runtime-intel = []
ruy = []
sentencepiece = ["dep:sentencepiece"]
system = [
    "intel-onemkl-prebuild?/system",
    "openblas-src?/system",
]
system-mkl = [
    "mkl",
    "intel-onemkl-prebuild/system",
]
tensor-parallel = []
tokenizers = ["dep:tokenizers"]
whisper = [
    "dep:mel_spec",
    "dep:ndarray",
    "dep:serde",
    "dep:serde_json",
    # CT2 Whisper models ship `tokenizer.json` (HF), not SentencePiece `.spm` files.
    "tokenizers",
    "ruy",
]

[lib]
name = "ct2rs"
path = "src/lib.rs"

[[example]]
name = "bart"
path = "examples/bart.rs"

[[example]]
name = "bloom"
path = "examples/bloom.rs"

[[example]]
name = "falcon"
path = "examples/falcon.rs"

[[example]]
name = "gpt-2"
path = "examples/gpt-2.rs"

[[example]]
name = "gpt-j"
path = "examples/gpt-j.rs"

[[example]]
name = "gpt-neox"
path = "examples/gpt-neox.rs"

[[example]]
name = "marian-mt"
path = "examples/marian-mt.rs"

[[example]]
name = "mpt"
path = "examples/mpt.rs"

[[example]]
name = "nllb"
path = "examples/nllb.rs"

[[example]]
name = "opt"
path = "examples/opt.rs"
required-features = ["tokenizers"]

[[example]]
name = "stream"
path = "examples/stream.rs"

[[example]]
name = "t5"
path = "examples/t5.rs"

[[example]]
name = "whisper"
path = "examples/whisper.rs"
