[package]
name = "xos"
version = "0.3.16"
edition = "2021"
description = "Python, cross-platform (+ios📱) with built-in viewports, audio drivers, ai/ml/sci compute operations, graphics, text rasterization, and more- tensorized and accelerator ready. Let's see what you can build!"
repository = "https://github.com/xlateai/xos"
authors = ["Dyllan McCreary <dyllan@xlate.ai>"]
license = "MIT"
default-run = "xos"

[dependencies]
burn = "0.20"
burn-autodiff = "0.20"
burn-backend = "0.20"
burn-ndarray = "0.20"
burn-wgpu = "0.20"
pixels = "0.15.0"
winit = "0.30.12"
winapi = { version = "0.3.9", features = ["winuser", "wingdi", "winbase"] }
clap = { version = "4.4.10", features = ["derive"] }
cpal = "0.16.0"
dialoguer = "0.11"
tiny_http = "0.12"
webbrowser = "1.0.6"
once_cell = "1.19"
fontdue = "0.9.3"
delaunator = "1.0"
rustpython-vm = "0.3.0"
ringbuf = "0.3"
include_dir = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
# Keep these in the workspace graph; MSVC release `strip` on proc-macro crates can cause E0463
# (`can't find crate for ...`) for Burn/CubeCL — see profile.release.package.* below.
darling = "0.21.3"
variadics_please = "1"

# -------------------------------------------------------------------
# Unix TTY size (`ioctl` TIOCGWINSZ) for xos.terminal.* on macOS/Linux/*BSD
# -------------------------------------------------------------------
[target.'cfg(unix)'.dependencies]
libc = "0.2"

# -------------------------------------------------------------------
# Non-WASM native dependencies
# -------------------------------------------------------------------
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rand = "0.9.2"
rand_chacha = "0.3"
rand_core = "0.6"
getrandom = "0.3.4"
# Offline identity + LAN mesh crypto (RSA handshake, AES-GCM wire)
rsa = { version = "0.9", features = ["pem", "sha2"] }
argon2 = "0.5"
aes-gcm = "0.10"
x25519-dalek = { version = "2", features = ["static_secrets", "getrandom"] }
hkdf = "0.12"
sha2 = "0.10"
base64 = "0.22"
dirs = "5"
rand_pcg = "0.9.0"
rayon = "1.10"
image = { version = "0.25", features = ["default-formats"] }
rodio = { version = "0.21.1", features = ["mp3", "flac", "vorbis", "wav"] }
ctrlc = "3.4"

# -------------------------------------------------------------------
# Desktop-only dependencies (exclude iOS)
# -------------------------------------------------------------------
[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "ios")))'.dependencies]
nokhwa = { version = "0.10.7", features = ["input-native"] }
rfd = "0.16.0"
mp3lame-encoder = "0.2.3"
# CTranslate2 (vendored C++ via ct2rs; not Python). Requires CMake + C/C++ toolchain on PATH (e.g. `brew install cmake`, Xcode CLT). Long compile.
ct2rs = { version = "0.9.18", default-features = false, features = ["whisper", "ruy"], optional = true }

# -------------------------------------------------------------------
# Apple platforms → Metal backend automatically enabled
# -------------------------------------------------------------------
[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
metal = "0.32.0"
objc = "0.2"

# Remote desktop: capture + synthetic input (desktop macOS only; not iOS)
[target.'cfg(target_os = "macos")'.dependencies]
# CGWindowList-based capture (full desktop); grant Screen Recording for the xos binary.
xcap = "0.9.4"
enigo = "0.1"
# System audio capture for input device list (ScreenCaptureKit; macOS 13+).
screencapturekit = { version = "1.5.4", features = ["macos_13_0"] }

# -------------------------------------------------------------------
# WebAssembly target
# -------------------------------------------------------------------
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "CanvasRenderingContext2d",
  "HtmlCanvasElement",
  "ImageData",
  "Document",
  "Window",
  "MouseEvent",
  "Navigator",
  "MediaDevices",
  "MediaStream",
  "MediaStreamConstraints",
  "HtmlVideoElement",
  "HtmlMediaElement",
  "TouchEvent",
  "Touch",
  "TouchList",
  "DomRect",
  "AudioContext",
  "AudioNode",
  "AudioDestinationNode",
  "AudioProcessingEvent",
  "ScriptProcessorNode",
  "MediaStreamAudioSourceNode",
  "console",
] }
console_error_panic_hook = "0.1"

[features]
default = []
## Whisper in CTranslate2 format. Opt-in with `--features whisper_ct2` when needed. Bundled path prefers `transcription/models/whisper-tiny-ct2/`, then `whisper-small-ct2/`, when complete. Overrides: `XOS_WHISPER_CT2_PATH`, `XOS_WHISPER_LANG` (default `en`). Desktop only (not iOS / WASM).
whisper_ct2 = ["dep:ct2rs"]

[lib]
path = "src/core/lib.rs"
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "xos"
path = "src/main.rs"

[[bin]]
name = "xpy"
path = "src/main.rs"

[[bin]]
name = "xrs"
path = "src/main.rs"

[workspace]
members = [".", "src/core/crates/xos-java"]
resolver = "2"

# gpu-allocator 0.27 allows windows 0.53–0.58; Cargo resolves 0.54 while wgpu-hal 26 uses 0.58, so DX12 types
# from two `windows` versions don't unify. Patch pins 0.27.0 to windows 0.58 (see src/core/patches/gpu-allocator/Cargo.toml).
[patch.crates-io]
gpu-allocator = { path = "src/core/patches/gpu-allocator" }

# Windows MSVC + release: stripping proc-macro rlibs/DLLs breaks rustc's ability to load them
# (E0463), which then breaks downstream crates (e.g. cubecl-ir / darling).
[profile.release.package.cubecl-macros]
strip = false
[profile.release.package.variadics_please]
strip = false
[profile.release.package.darling_macro]
strip = false
