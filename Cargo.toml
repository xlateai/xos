[package]
name = "xos"
version = "0.1.23"
edition = "2021"
description = "Experimental OS Windows Manager"
authors = ["Dyllan McCreary <dyllan@xlate.ai>"]
license = "MIT"

[features]
default = []
python = ["pyo3", "pyo3/extension-module"]

[dependencies]
pixels = "0.15.0"
winit = "0.30.12"
winapi = { version = "0.3.9", features = ["winuser"] }
clap = { version = "4.4.10", features = ["derive"] }
cpal = "0.16.0"
dialoguer = "0.11"
tiny_http = "0.12"
webbrowser = "1.0.6"
once_cell = "1.19"
fontdue = "0.9.3"
delaunator = "1.0"
rustpython-vm = "0.3.0"

# -------------------------------------------------------------------
# Non-WASM native dependencies
# -------------------------------------------------------------------
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rand = "0.9.2"
getrandom = "0.3.4"
rand_pcg = "0.9.0"
image = { version = "0.25", features = ["default-formats"] }
pyo3 = { version = "0.27.2", optional = true, features = ["extension-module"] }
rodio = { version = "0.21.1", features = ["mp3", "flac", "vorbis", "wav"] }

# -------------------------------------------------------------------
# Desktop-only dependencies (exclude iOS)
# -------------------------------------------------------------------
[target.'cfg(all(not(target_arch = "wasm32"), not(target_os = "ios")))'.dependencies]
nokhwa = { version = "0.10.7", features = ["input-native"] }
rfd = "0.16.0"

# -------------------------------------------------------------------
# Apple platforms → Metal backend automatically enabled
# -------------------------------------------------------------------
[target.'cfg(any(target_os = "macos", target_os = "ios"))'.dependencies]
metal = "0.32.0"
objc = "0.2"

# -------------------------------------------------------------------
# WebAssembly target
# -------------------------------------------------------------------
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
  "CanvasRenderingContext2d",
  "HtmlCanvasElement",
  "ImageData",
  "Document",
  "Window",
  "MouseEvent",
  "Navigator",
  "MediaDevices",
  "MediaStream",
  "MediaStreamConstraints",
  "HtmlVideoElement",
  "HtmlMediaElement",
  "TouchEvent",
  "Touch",
  "TouchList",
  "DomRect",
  "AudioContext",
  "AudioNode",
  "AudioDestinationNode",
  "AudioProcessingEvent",
  "ScriptProcessorNode",
  "MediaStreamAudioSourceNode",
  "console",
] }
console_error_panic_hook = "0.1"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "xos"
path = "src/main.rs"
